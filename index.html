<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Swapnil Bhole — Hardware / RTL / 5G Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: oklch(0.16 0.005 240);
        --bg-2: oklch(0.20 0.006 240);
        --surface: oklch(0.22 0.007 240);
        --surface-hi: oklch(0.27 0.008 240);
        --text: oklch(0.96 0.005 240);
        --text-dim: oklch(0.78 0.006 240);
        --muted: oklch(0.58 0.008 240);
        --stroke: oklch(0.30 0.008 240);
        --stroke-hi: oklch(0.42 0.01 240);
        --accent: oklch(0.78 0.10 230);
        --accent-2: oklch(0.62 0.12 240);
        --accent-glow: 137 180 217;
        --grid: oklch(0.24 0.006 240 / 0.5);
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overflow-x: hidden;
      }
      ::selection { background: rgb(var(--accent-glow) / 0.35); color: var(--text); }

      .font-display { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; letter-spacing: -0.01em; }
      .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
      .tabular { font-variant-numeric: tabular-nums; }

      .accent-grad {
        background: linear-gradient(90deg, oklch(0.78 0.10 230) 0%, oklch(0.62 0.12 250) 100%);
      }
      .accent-grad-text {
        background: linear-gradient(90deg, oklch(0.82 0.10 220) 0%, oklch(0.70 0.12 250) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      /* dotted grid background utility */
      .bg-grid {
        background-image:
          radial-gradient(circle at 1px 1px, var(--grid) 1px, transparent 0);
        background-size: 24px 24px;
      }
      .bg-grid-fine {
        background-image:
          linear-gradient(to right, var(--grid) 1px, transparent 1px),
          linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
        background-size: 48px 48px;
      }

      /* halftone */
      .halftone-overlay {
        background-image: radial-gradient(circle, #000 1px, transparent 1px);
        background-size: 4px 4px;
        mix-blend-mode: multiply;
        opacity: 0.18;
      }

      /* keyframes */
      @keyframes scrollDown {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(200%); }
      }
      @keyframes roleFade {
        from { opacity: 0; transform: translateY(8px); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
      }
      @keyframes blurIn {
        from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
      }
      @keyframes nameReveal {
        from { opacity: 0; transform: translateY(50px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulseDot {
        0%, 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.6); }
        50% { box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
      }
      @keyframes gradShift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }
      @keyframes wavePulse {
        0%, 100% { opacity: 0.4; transform: scaleY(0.6); }
        50% { opacity: 1; transform: scaleY(1); }
      }
      @keyframes marquee {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
      }
      @keyframes spinSlow { to { transform: rotate(360deg); } }
      @keyframes blink { 50% { opacity: 0; } }

      .scroll-down-line { animation: scrollDown 1.8s ease-in-out infinite; }
      .role-fade { animation: roleFade 0.5s ease-out; }
      .blur-in { animation: blurIn 0.9s ease-out both; }
      .name-reveal { animation: nameReveal 1.1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s both; }
      .pulse-dot { animation: pulseDot 2s ease-in-out infinite; }
      .marquee-track { animation: marquee 40s linear infinite; }
      .spin-slow { animation: spinSlow 18s linear infinite; }
      .blink-cursor { animation: blink 1.1s step-end infinite; }

      /* gradient ring on hover for buttons */
      .ring-grad-hover { position: relative; isolation: isolate; }
      .ring-grad-hover::before {
        content: "";
        position: absolute;
        inset: -2px;
        border-radius: inherit;
        background: linear-gradient(110deg, oklch(0.82 0.10 220), oklch(0.62 0.12 260), oklch(0.82 0.10 220));
        background-size: 200% 100%;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: -1;
        animation: gradShift 6s ease infinite;
      }
      .ring-grad-hover:hover::before { opacity: 1; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: var(--stroke); border-radius: 8px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--stroke-hi); }

      /* utility classes that mirror tailwind names I use */
      .container-px { padding-left: 1.5rem; padding-right: 1.5rem; }
      @media (min-width: 768px) { .container-px { padding-left: 2.5rem; padding-right: 2.5rem; } }
      @media (min-width: 1024px) { .container-px { padding-left: 4rem; padding-right: 4rem; } }

      /* Waveform bars */
      .wave-bar { animation: wavePulse 1.2s ease-in-out infinite; transform-origin: center bottom; }

      /* prevent layout shift while fonts load */
      .font-display, .font-mono { font-display: swap; }

      /* hide arrows but allow click */
      a { color: inherit; text-decoration: none; }
      button { font-family: inherit; cursor: pointer; }

      /* focus */
      :focus-visible { outline: 2px solid oklch(0.78 0.10 230 / 0.7); outline-offset: 3px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

    <script type="text/babel" src="src/data.jsx"></script>
    <script type="text/babel" src="src/visuals.jsx"></script>
    <script type="text/babel" src="src/components.jsx"></script>
    <script type="text/babel" src="src/contact-modal.jsx"></script>
    <script type="text/babel" src="src/sections.jsx"></script>
    <script type="text/babel" src="src/app.jsx"></script>
  </body>
</html>
